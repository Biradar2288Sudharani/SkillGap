<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Skill Gap Checker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">

  <div class="auth-card">
    <h1>Skill Gap Checker</h1>
    <p class="auth-subtitle">Log in to continue</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="auth-error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" novalidate>
      <label>Username</label>
      <input type="text" name="username" required autofocus autocomplete="username">

      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">

      <button type="submit">Log In</button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="{{ url_for('register') }}">Register</a>
    </p>
  </div>

</body>
</html>
